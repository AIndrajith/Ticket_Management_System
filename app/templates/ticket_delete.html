{% extends "base.html" %}
{% block content %}
<div class="panel" style="max-width: 520px; margin: 0 auto; text-align: center;">

    <div style="
        width: 64px;
        height: 64px;
        background-color: #fff5f5;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        font-size: 2rem;
    ">
        🗑️
    </div>

    <h2 style="margin-bottom: 0.5rem; color: #2d3748;">Delete Ticket</h2>

    <p style="color: #718096; font-size: 0.95rem; margin-bottom: 0.75rem;">
        Are you sure you want to permanently delete
        <strong style="color: #2d3748;">Ticket #{{ ticket.id }} — {{ ticket.title }}</strong>?
    </p>

    <div style="
        background-color: #fff5f5;
        border: 1px solid #feb2b2;
        border-radius: 6px;
        padding: 0.75rem 1rem;
        margin-bottom: 2rem;
        font-size: 0.875rem;
        color: #c53030;
        font-weight: 600;
    ">
        ⚠️ This action cannot be undone.
    </div>

    <form method="post" action="/tickets/{{ ticket.id }}/delete">
        <div style="display: flex; gap: 1rem; justify-content: center;">
            <button type="submit" class="btn btn-danger" style="padding: 0.75rem 2rem;">
                Yes, Delete Ticket
            </button>
            <a href="/tickets/{{ ticket.id }}" class="btn btn-secondary" style="padding: 0.75rem 1.5rem;">
                Cancel
            </a>
        </div>
    </form>

</div>
{% endblock %}
